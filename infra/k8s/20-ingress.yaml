# External access. Single host, two paths, same origin (so no CORS needed):
#   /api  -> api      (the API container strips the /api prefix itself)
#   /     -> frontend
#
# Assumes an ingress-nginx controller. For OpenShift, use a Route instead
# (see infra/k8s/README.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing
  namespace: secure-event-ticketing
  labels:
    app.kubernetes.io/part-of: secure-event-ticketing
spec:
  ingressClassName: nginx
  rules:
    - host: ticketing.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
