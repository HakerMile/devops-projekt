apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: secure-event-ticketing
  labels:
    app: api
    tier: api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: secure-event-ticketing
spec:
  replicas: 2 # multiple replicas enable zero-downtime rolling updates
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: api
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: secure-event-ticketing
    spec:
      serviceAccountName: ticketing-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/hakermile/ticketing-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-db-credentials
          startupProbe:
            # Gives the app up to 60s to connect to Postgres + Redis on boot
            # before liveness starts policing it.
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            # /readyz checks Postgres + Redis connectivity, so the pod only
            # receives traffic once its dependencies are reachable.
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: secure-event-ticketing
  labels:
    app: api
    tier: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
