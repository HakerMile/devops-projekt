# =============================================================================
# TEMPLATE ONLY - do NOT commit a real Secret with production credentials.
#
# This file documents the shape of the Secret the app expects. Create the real
# Secret out-of-band so passwords never live in Git. Two options:
#
#   1) Imperatively (recommended for the lab):
#        kubectl -n secure-event-ticketing create secret generic ticketing-db-credentials \
#          --from-literal=POSTGRES_USER=ticketing_user \
#          --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 24)"
#
#   2) Declaratively: copy this file to secret.yaml (git-ignored), set real
#      values, and `kubectl apply -f secret.yaml`.
#
# In a real cluster, prefer Sealed Secrets / External Secrets Operator / a
# cloud secret manager instead of plain Kubernetes Secrets.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ticketing-db-credentials
  namespace: secure-event-ticketing
type: Opaque
stringData:
  POSTGRES_USER: "ticketing_user"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
